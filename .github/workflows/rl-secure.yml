name: RL-Secure Workflow
run-name: rl-scanner

on:
  workflow_call:
    inputs:
      nuspec-file:
        type: string        
        required: true
      artifact-name:
        type: string
        required: true
      project-path:
        type: string
        required: true
    secrets:
      RLSECURE_LICENSE:
        required: true
      RLSECURE_SITE_KEY:
        required: true
      SIGNAL_HANDLER_TOKEN:
        required: true
      SIGNAL_HANDLER_DOMAIN:
        required: true
      PRODSEC_TOOLS_USER:
        required: true
      PRODSEC_TOOLS_TOKEN:
        required: true
      PRODSEC_TOOLS_ARN:
        required: true
      PRODSEC_PYTHON_TOOLS_REPO:
        required: true

jobs:
  rl-scanner:
    name: Run Reversing Labs scanner
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.merged && startsWith(github.event.pull_request.head.ref, 'release/'))
    runs-on: ubuntu-latest
    outputs:
      scan-status: ${{ steps.rl-scan-conclusion.outcome }}

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: '9.0.200'

      - name: Setup Mono
        run: |
          sudo apt-get update
          sudo apt-get install -y mono-complete

      - name: Setup NuGet
        uses: nuget/setup-nuget@d105a947828025cd7a980103c35ba2bfae586d0f # v2.0.2

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          path: './src'
          name: build

      - name: Create NuGet packages
        shell: pwsh
        env:
          NUSPEC_FILE: ${{ inputs.nuspec-file }}
          NUGET_OUTPUT: ${{ github.workspace }}/nuget
        run: |
            nuget pack $env:NUSPEC_FILE -OutputDirectory $env:NUGET_OUTPUT

      - name: Create tgz build artifact
        env:
          ARTIFACT_NAME: ${{ inputs.artifact-name }}
          WORKSPACE: ${{ github.workspace }}
        run: |
          tar -czvf "$WORKSPACE/$ARTIFACT_NAME" "$WORKSPACE/nuget"

      - id: get_version
        uses: ./.github/actions/get-version
        with:
          working-directory: ${{ inputs.project-path }}

      - name: Run RL Scanner
        id: rl-scan-conclusion
        uses: auth0/devsecops-tooling/.github/actions/rl-scan@e29f26478db18ff0bcbe4bc447a8fbd54fbeec9e # main on 2026-06-09, TODO: use a release instead
        with:
          artifact-name: ${{ inputs.artifact-name }}
          artifact-path: ${{ github.workspace }}/${{ inputs.artifact-name }}
          version: "${{ steps.get_version.outputs.version }}"
          RLSECURE_LICENSE: ${{ secrets.RLSECURE_LICENSE }}
          RLSECURE_SITE_KEY: ${{ secrets.RLSECURE_SITE_KEY }}
          SIGNAL_HANDLER_TOKEN: ${{ secrets.SIGNAL_HANDLER_TOKEN }}
          SIGNAL_HANDLER_DOMAIN: ${{ secrets.SIGNAL_HANDLER_DOMAIN }}
          PRODSEC_TOOLS_ARN: ${{ secrets.PRODSEC_TOOLS_ARN }}
          PRODSEC_TOOLS_USER: ${{ secrets.PRODSEC_TOOLS_USER }}
          PRODSEC_TOOLS_TOKEN: ${{ secrets.PRODSEC_TOOLS_TOKEN }}
          PRODSEC_PYTHON_TOOLS_REPO: ${{ secrets.PRODSEC_PYTHON_TOOLS_REPO }}
        
      - name: Output scan result
        run: echo "scan-status=${{ steps.rl-scan-conclusion.outcome }}" >> $GITHUB_ENV